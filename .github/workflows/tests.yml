name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e . pytest
      - name: Run test suite
        run: python -m pytest -q
      - name: Regenerate public showcase trace
        run: python -m synthia_core.cli showcase export --case aburria --output /tmp/aburria-trace.json --pretty
      - name: Verify generated trace is committed
        run: diff -u web/landing/data/aburria-trace.json /tmp/aburria-trace.json
